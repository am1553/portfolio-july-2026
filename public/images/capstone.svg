<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architecture diagram illustration for the issue reporting system capstone project">
  <defs>
    <!-- Grainy noise filter to match the portfolio's texture language -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Soft blob blur for the background atmosphere -->
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <!-- Subtle drop shadow for the floating tiles -->
    <filter id="tileShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#2a1810" flood-opacity="0.12"/>
    </filter>

    <!-- Coral gradient for accents -->
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a7b"/>
      <stop offset="100%" stop-color="#a8421f"/>
    </linearGradient>

    <!-- Sage gradient -->
    <linearGradient id="sageGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8c8b8"/>
      <stop offset="100%" stop-color="#3d5e4a"/>
    </linearGradient>
  </defs>

  <!-- Warm cream base, slightly darker at edges for depth -->
  <rect width="1600" height="1000" fill="#fbf3e8"/>

  <!-- Atmospheric blobs (decorative, mimicking the portfolio's gradient world) -->
  <g filter="url(#softBlur)" opacity="0.55">
    <ellipse cx="200" cy="200" rx="280" ry="240" fill="#ffd4b8"/>
    <ellipse cx="1400" cy="850" rx="320" ry="260" fill="#c8d9c0"/>
    <ellipse cx="1300" cy="180" rx="220" ry="180" fill="#ffe08a" opacity="0.6"/>
  </g>

  <!-- Title block top-left -->
  <g transform="translate(80, 80)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" fill="#a8421f" letter-spacing="3" font-weight="600">CAPSTONE · IN PROGRESS</text>
    <text x="0" y="60" font-family="Georgia, serif" font-style="italic" font-size="52" font-weight="600" fill="#2a1810">Issue Reporting</text>
    <text x="0" y="115" font-family="Georgia, serif" font-style="italic" font-size="52" font-weight="600" fill="#2a1810">System.</text>
    <text x="0" y="165" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#6b5444" letter-spacing="0.5">three-tier · typescript · postgres</text>
  </g>

  <!-- Three-tier architecture diagram, centered lower half -->
  <!-- Slight overall rotation for organic asymmetry -->
  <g transform="translate(800, 600) rotate(-2)">

    <!-- Connector line behind the tiles -->
    <line x1="-560" y1="0" x2="380" y2="0" stroke="#a8421f" stroke-width="2" stroke-dasharray="6 6" opacity="0.4"/>

    <!-- TILE 1: Frontend (React) -->
    <g transform="translate(-560, 0)" filter="url(#tileShadow)">
      <rect x="-130" y="-90" width="260" height="180" rx="14" fill="#ffffff" stroke="#2a1810" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="-50" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a8421f" letter-spacing="2" font-weight="600">CLIENT</text>
      <text x="0" y="-10" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2a1810">React</text>
      <text x="0" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#6b5444">TypeScript · Vite</text>
      <line x1="-90" y1="45" x2="90" y2="45" stroke="#e8ddd0" stroke-width="1"/>
      <text x="0" y="68" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#8a7565">presentation</text>
    </g>

    <!-- Arrow + payload between client and server -->
    <g transform="translate(-380, 0)">
      <path d="M -45 0 L 45 0" stroke="#2a1810" stroke-width="1.5" fill="none"/>
      <path d="M 38 -6 L 45 0 L 38 6" stroke="#2a1810" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <rect x="-40" y="-28" width="80" height="20" rx="4" fill="#fbf3e8" stroke="#a8421f" stroke-width="1"/>
      <text x="0" y="-14" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#a8421f" font-weight="600">JSON · REST</text>
    </g>

    <!-- TILE 2: Backend (Express) — slightly elevated to break the line -->
    <g transform="translate(-150, -10)" filter="url(#tileShadow)">
      <rect x="-150" y="-110" width="300" height="220" rx="14" fill="#2a1810" opacity="0.97"/>
      <text x="0" y="-70" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#ff9a7b" letter-spacing="2" font-weight="600">API LAYER</text>
      <text x="0" y="-30" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#fbf3e8">Express</text>
      <text x="0" y="0" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#c8b8a0">Node · TypeScript</text>
      <line x1="-100" y1="22" x2="100" y2="22" stroke="#6b5444" stroke-width="1"/>

      <!-- Stack of pills representing middleware layers -->
      <g transform="translate(0, 50)">
        <rect x="-90" y="-10" width="180" height="20" rx="10" fill="#3d5e4a"/>
        <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fbf3e8" font-weight="500">Zod validation</text>
      </g>
      <g transform="translate(0, 78)">
        <rect x="-90" y="-10" width="180" height="20" rx="10" fill="#a8421f"/>
        <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fbf3e8" font-weight="500">JWT · bcrypt</text>
      </g>
    </g>

    <!-- Arrow + payload between server and database -->
    <g transform="translate(110, 0)">
      <path d="M -45 0 L 45 0" stroke="#2a1810" stroke-width="1.5" fill="none"/>
      <path d="M 38 -6 L 45 0 L 38 6" stroke="#2a1810" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <rect x="-50" y="-28" width="100" height="20" rx="4" fill="#fbf3e8" stroke="#3d5e4a" stroke-width="1"/>
      <text x="0" y="-14" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3d5e4a" font-weight="600">parameterised SQL</text>
    </g>

    <!-- TILE 3: PostgreSQL -->
    <g transform="translate(380, 0)" filter="url(#tileShadow)">
      <rect x="-150" y="-110" width="300" height="220" rx="14" fill="#ffffff" stroke="#2a1810" stroke-width="1.5" opacity="0.95"/>
      <text x="0" y="-70" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#3d5e4a" letter-spacing="2" font-weight="600">PERSISTENCE</text>
      <text x="0" y="-30" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2a1810">PostgreSQL</text>
      <text x="0" y="0" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#6b5444">node-postgres · no ORM</text>
      <line x1="-100" y1="22" x2="100" y2="22" stroke="#e8ddd0" stroke-width="1"/>

      <!-- Schema hint: two tables -->
      <g transform="translate(-50, 60)">
        <rect x="-32" y="-15" width="64" height="40" rx="3" fill="none" stroke="#2a1810" stroke-width="1"/>
        <line x1="-32" y1="-3" x2="32" y2="-3" stroke="#2a1810" stroke-width="1"/>
        <text x="0" y="-7" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#2a1810" font-weight="600">users</text>
        <text x="0" y="13" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#6b5444">PK · email</text>
      </g>
      <g transform="translate(50, 60)">
        <rect x="-32" y="-15" width="64" height="40" rx="3" fill="none" stroke="#2a1810" stroke-width="1"/>
        <line x1="-32" y1="-3" x2="32" y2="-3" stroke="#2a1810" stroke-width="1"/>
        <text x="0" y="-7" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#2a1810" font-weight="600">issues</text>
        <text x="0" y="13" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#6b5444">FK · status</text>
      </g>
      <!-- One-to-many connector between the two mini-tables -->
      <line x1="318" y1="60" x2="332" y2="60" stroke="#a8421f" stroke-width="1.2"/>
      <circle cx="316" cy="60" r="2" fill="#a8421f"/>
    </g>

  </g>

  <!-- Floating "evaluated against" annotations top-right, like margin notes -->
  <g transform="translate(1100, 100)" font-family="ui-monospace, monospace" font-size="13" fill="#6b5444">
    <text x="0" y="0" fill="#a8421f" font-weight="600" letter-spacing="2">EVALUATED AGAINST</text>
    <text x="0" y="28" font-size="14">→ Nielsen heuristics</text>
    <text x="0" y="50" font-size="14">→ WCAG 2.2 AA</text>
    <text x="0" y="72" font-size="14">→ OWASP guidelines</text>
    <text x="0" y="94" font-size="14">→ functional tests</text>
  </g>

  <!-- Bottom-left detail: small status badges echoing the issue tracker's domain -->
  <g transform="translate(80, 880)">
    <g>
      <rect x="0" y="0" width="58" height="22" rx="11" fill="#ff9a7b" opacity="0.85"/>
      <text x="29" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#2a1810" font-weight="600">open</text>
    </g>
    <g transform="translate(70, 0)">
      <rect x="0" y="0" width="92" height="22" rx="11" fill="#ffe08a" opacity="0.85"/>
      <text x="46" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#2a1810" font-weight="600">in_progress</text>
    </g>
    <g transform="translate(174, 0)">
      <rect x="0" y="0" width="78" height="22" rx="11" fill="#a8c8b8" opacity="0.95"/>
      <text x="39" y="15" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#2a1810" font-weight="600">resolved</text>
    </g>
  </g>

  <!-- Bottom-right: project number / signature, like a print mark -->
  <g transform="translate(1520, 920)" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#8a7565" letter-spacing="2">
    <text x="0" y="0">TM470 · 2026</text>
    <text x="0" y="18">github.com/am1553/issue-reporting</text>
  </g>

  <!-- Grain overlay across the whole canvas -->
  <rect width="1600" height="1000" fill="#2a1810" filter="url(#grain)" opacity="0.18"/>
</svg>
